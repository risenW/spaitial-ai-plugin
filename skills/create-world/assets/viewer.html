<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SpAItial World Viewer</title>
  <script type="importmap">
    {
      "imports": {
        "playcanvas": "https://cdn.jsdelivr.net/npm/playcanvas@latest/build/playcanvas.mjs"
      }
    }
  </script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@playcanvas/web-components@latest/dist/pwc.mjs"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0b0d12; color: #e7e9ee; }
    #stage { position: fixed; inset: 0; }
    #stage pc-app { width: 100vw; height: 100vh; display: block; }

    #drop {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px; text-align: center; padding: 24px;
      background: radial-gradient(120% 120% at 50% 30%, #161a23 0%, #0b0d12 70%);
      z-index: 10; transition: background .15s ease;
    }
    #drop.hover { background: radial-gradient(120% 120% at 50% 30%, #1d2434 0%, #0b0d12 70%); }
    #drop h1 { font-size: 20px; font-weight: 650; margin: 0; letter-spacing: .2px; }
    #drop p { margin: 0; color: #9aa3b2; font-size: 14px; max-width: 460px; line-height: 1.5; }
    .card {
      border: 1.5px dashed #38415a; border-radius: 16px; padding: 40px 48px;
      background: rgba(255,255,255,.02); display: flex; flex-direction: column; gap: 16px; align-items: center;
    }
    .btn {
      appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
      background: #4c6ef5; color: #fff; padding: 11px 20px; border-radius: 10px;
    }
    .btn:hover { background: #5c7cfa; }
    .hint { font-size: 12px; color: #6c7689; }
    .badge { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #6c7689; }
    #err { color: #ff8787; font-size: 13px; min-height: 16px; }
    #reopen {
      position: fixed; top: 14px; left: 14px; z-index: 20; display: none;
      background: rgba(20,24,33,.8); backdrop-filter: blur(6px);
      border: 1px solid #2a3242; color: #cdd3df; border-radius: 9px; padding: 7px 12px;
      font-size: 12px; cursor: pointer;
    }
    #reopen:hover { color: #fff; border-color: #3a4459; }
  </style>
</head>
<body>
  <button id="reopen" title="Load a different world">Load another world</button>
  <div id="stage"></div>

  <div id="drop">
    <div class="card">
      <div class="badge">SpAItial World Viewer</div>
      <h1>Drop a splat file to view it</h1>
      <p>Drag a <code>.sog</code>, <code>.compressed.ply</code>, or <code>.ply</code> file anywhere on this page,
         or choose one below. Everything runs locally in your browser — nothing is uploaded.</p>
      <input id="file" type="file" accept=".sog,.ply,.compressed.ply" hidden />
      <button class="btn" id="pick">Choose a splat file</button>
      <div id="err"></div>
      <p style="font-size:12px;color:#6c7689">Orbit: left-drag · Pan: right-drag · Zoom: scroll wheel</p>
    </div>
  </div>

  <script>
    const stage  = document.getElementById('stage');
    const drop   = document.getElementById('drop');
    const fileEl = document.getElementById('file');
    const errEl  = document.getElementById('err');
    const reopen = document.getElementById('reopen');

    // Build a fresh PlayCanvas Web Components app pointed at the given splat URL.
    // type="gsplat" is set explicitly so extension-less blob: URLs load correctly.
    function showSplat(src) {
      errEl.textContent = '';
      stage.innerHTML = `
        <pc-app antialias="false" high-resolution="false">
          <pc-asset src="https://cdn.jsdelivr.net/npm/playcanvas/scripts/esm/camera-controls.mjs"></pc-asset>
          <pc-asset id="world" type="gsplat" src="${src}"></pc-asset>
          <pc-scene>
            <pc-entity position="0 0 2.5">
              <pc-camera></pc-camera>
              <pc-scripts>
                <pc-script name="cameraControls"></pc-script>
              </pc-scripts>
            </pc-entity>
            <pc-entity rotation="0 0 180">
              <pc-splat asset="world"></pc-splat>
            </pc-entity>
          </pc-scene>
        </pc-app>`;
      drop.style.display = 'none';
      reopen.style.display = 'block';
    }

    function loadFile(file) {
      if (!file) return;
      const name = file.name.toLowerCase();
      if (!/\.(sog|ply)$/.test(name)) {
        errEl.textContent = 'Unsupported file. Use .sog, .compressed.ply, or .ply.';
        return;
      }
      showSplat(URL.createObjectURL(file));
    }

    document.getElementById('pick').addEventListener('click', () => fileEl.click());
    fileEl.addEventListener('change', e => loadFile(e.target.files[0]));
    reopen.addEventListener('click', () => { drop.style.display = 'flex'; });

    // Drag and drop anywhere.
    ['dragenter', 'dragover'].forEach(ev =>
      window.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('hover'); }));
    ['dragleave', 'drop'].forEach(ev =>
      window.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('hover'); }));
    window.addEventListener('drop', e => loadFile(e.dataTransfer.files[0]));

    // Optional: auto-load from ?src=<url> (e.g. a fresh signed splat URL). Subject to the
    // host's CORS policy; local drag-and-drop is the most reliable path.
    const q = new URLSearchParams(location.search).get('src');
    if (q) showSplat(q);
  </script>
</body>
</html>
